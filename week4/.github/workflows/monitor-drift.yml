name: Drift Monitoring

on:
  schedule:
    - cron: '0 9 * * *'  # Daily 09:00 UTC — ~24h ground-truth lag makes sub-daily checks pointless; daily stays actionable and low-cost
  push:
    branches: [main]
    paths:
      - 'week4/data/**'
      - 'week4/scripts/**'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read     # checkout
      issues: write      # the alert step opens a drift-alert issue via github-script
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow numpy scipy

      - name: Compute monitoring metrics
        id: metrics
        run: |
          cd week4
          python3 scripts/compute_metrics.py

      - name: Detect drift patterns
        id: drift
        run: |
          cd week4
          python3 scripts/detect_drift.py

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: monitoring-metrics
          path: week4/metrics-*.json

      - name: Create alert if drift detected
        if: steps.metrics.outputs.alert == 'true' || steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift alert — critical thresholds breached (${date})`,
              body: `The scheduled drift-monitoring run breached a **critical** metric or drift threshold.\n\nSee the run logs and the \`metrics-*.json\` artifact for evidence:\n${runUrl}`,
              labels: ['drift-alert']
            });

      - name: Monitoring complete
        if: success()
        run: echo "Drift monitoring run complete (an issue is opened only on critical breaches; see the run summary and metrics artifact)."
