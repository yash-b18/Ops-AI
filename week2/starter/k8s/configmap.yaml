# ConfigMap: store non-secret configuration (bucket names, flags, etc)
# Deployment will reference this to inject env vars into pods

apiVersion: v1
kind: ConfigMap
metadata:
  name: demand-api-config
  labels:
    app: demand-api

data:
  # GCS bucket containing the model and data files
  # MUST match the bucket you created in Part 0 (without gs://)
  # Example: "ops-ai-alice-data" (replace [YOUR-NAME] with your actual suffix)
  GCS_BUCKET: "ops-ai-496923-data"
