apiVersion: apps/v1
kind: Deployment
metadata:
  name: demand-api
  labels:
    app: demand-api

spec:
  replicas: TODO

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: TODO
      maxUnavailable: TODO

  selector:
    matchLabels:
      app: demand-api

  template:
    metadata:
      labels:
        app: demand-api
    spec:
      # Authentication for pulling images from Artifact Registry
      # You must create this secret (see README Part 2)
      imagePullSecrets:
      - name: artifact-registry-secret

      initContainers:
      - name: download-data
        image: google/cloud-sdk:slim
        command:
          - /bin/sh
          - -c
          - |
            # Authenticate using service account key
            gcloud auth activate-service-account --key-file=/var/secrets/gcs/key.json
            gsutil cp gs://${GCS_BUCKET}/demand_enriched.parquet /data/processed/
            gsutil cp gs://${GCS_BUCKET}/lgbm_demand_model.txt /data/processed/
            gsutil cp gs://${GCS_BUCKET}/zone_hour_avg_fare.parquet /data/processed/
            gsutil cp gs://${GCS_BUCKET}/taxi_zones.geojson /data/processed/
        env:
        - name: GCS_BUCKET
          valueFrom:
            configMapKeyRef:
              name: demand-api-config
              key: GCS_BUCKET
        volumeMounts:
        - name: data
          mountPath: /data/processed
        - name: gcs-sa-key
          mountPath: /var/secrets/gcs
          readOnly: true

      containers:
      - name: demand-api
        image: us-central1-docker.pkg.dev/ops-ai-[YOUR-NAME]/docker-repo/demand-api:latest
        imagePullPolicy: TODO
        ports:
        - containerPort: 8000
        env:
        - name: GCS_BUCKET
          valueFrom:
            configMapKeyRef:
              name: demand-api-config
              key: GCS_BUCKET
        resources:
          requests:
            cpu: TODO
            memory: TODO
          limits:
            cpu: TODO
            memory: TODO
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: TODO
          periodSeconds: TODO
          failureThreshold: TODO
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: TODO
          periodSeconds: TODO
          failureThreshold: TODO

        volumeMounts:
        - name: data
          mountPath: /data/processed

      # Shared volume for init container + main container
      volumes:
      - name: data
        emptyDir: {}
      - name: gcs-sa-key
        secret:
          secretName: gcs-sa-key  # Created in Part 2 Step 1b (see README)
